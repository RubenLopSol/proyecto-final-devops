name: CI-Lint-Test-Validate

permissions: read-all

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/openpanel

jobs:
  # ---------------------------------------------------------------------------
  # NOTE: lint-and-test is intentionally disabled.
  #
  # This is a DevOps project — its purpose is to build, ship, and run the
  # openpanel application reliably, not to maintain its source code.
  # Linting, type checking, and testing the app code is the responsibility
  # of the application team, not the infrastructure pipeline.
  #
  # The CI here focuses on what actually matters for DevOps:
  #   - Are the Kubernetes manifests valid and safe? (validate-infra)
  #   - Are there any secrets accidentally committed? (secret-scan)
  #   - Do the Docker images build and pass security scanning? (ci-build-publish)
  #
  # If this project ever takes ownership of the app code, uncomment the job
  # below and make sure the upstream code passes biome check first.
