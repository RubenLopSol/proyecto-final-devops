  #
  #     - name: Cache pnpm store
  #       uses: actions/cache@v4
  #       with:
  #         path: ${{ steps.pnpm-cache.outputs.store }}
  #         key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
  #         restore-keys: |
  #           ${{ runner.os }}-pnpm-
  #
  #     - name: Install dependencies
  #       run: pnpm install --frozen-lockfile
