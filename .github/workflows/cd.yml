name: CD Pipeline - Update GitOps Manifests

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

jobs:
  update-manifests:
    name: Update Image Tags
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update API image tag
        run: |
          sed -i "s|image: ghcr.io/.*/openpanel-api:.*|image: ghcr.io/${{ github.repository_owner }}/openpanel-api:main-${{ steps.sha.outputs.short }}|g" \
            k8s/base/openpanel/api-deployment-blue.yaml

      - name: Update Start image tag
        run: |
          sed -i "s|image: ghcr.io/.*/openpanel-start:.*|image: ghcr.io/${{ github.repository_owner }}/openpanel-start:main-${{ steps.sha.outputs.short }}|g" \
            k8s/base/openpanel/start-deployment.yaml

      - name: Update Worker image tag
        run: |
          sed -i "s|image: ghcr.io/.*/openpanel-worker:.*|image: ghcr.io/${{ github.repository_owner }}/openpanel-worker:main-${{ steps.sha.outputs.short }}|g" \
            k8s/base/openpanel/worker-deployment.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git diff --staged --quiet || git commit -m "chore: update image tags to main-${{ steps.sha.outputs.short }}"
          git push
