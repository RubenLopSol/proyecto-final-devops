name: CI-Build-Publish

# ---------------------------------------------------------------------------
# WHAT THIS WORKFLOW DOES
#
# Gate 2 of the CI/CD chain. Triggered automatically when CI-Lint-Test-Validate
# succeeds on master/main (never on PRs — images are only published from the
# main branch).
#
# Jobs:
#   build-and-push  — builds Docker images for api/start/worker, pushes to
#                     GHCR with a SHA-based tag, generates an SBOM artifact
#   security-scan   — runs Trivy CVE scanner against each pushed image,
#                     uploads results to GitHub Security tab (SARIF)
#
# Downstream: on success, triggers CD-Update-GitOps-Manifests which commits
# the new image tags into the GitOps manifests.
# ---------------------------------------------------------------------------


permissions: read-all

# Each commit SHA gets its own build group so builds don't cancel each other.
# cancel-in-progress: false ensures every pushed commit produces a published
# image — if two commits land close together, the second queues, not cancels.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

on:
  workflow_run:
    workflows: ["CI-Lint-Test-Validate"]
    types: [completed]
    branches: [master, main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/openpanel

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build & Push Docker images
  # Runs in a matrix across the three services: api, start, worker.
  # fail-fast: false — if one service fails to build we still want the
  # results for the other two (visibility over early bail-out).
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
      id-token: write    # required for SBOM attestation
    strategy:
      fail-fast: false
      matrix:
        service: [api, start, worker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Check out the exact commit that triggered the upstream CI run,
          # not HEAD of the default branch (they may differ in a busy repo).
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=main-
            type=raw,value=latest
            type=semver,pattern=v{{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./openpanel
          file: ./openpanel/apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        # Scans the exact SHA-tagged image that was just built — not :latest,
        # which could point to a different image if another build ran in between.
        # steps.meta.outputs.version resolves to "main-<sha7>" for branch pushes.
        uses: anchore/sbom-action@v0.17.2
        with:
          image: "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.meta.outputs.version }}"
          format: spdx-json
          output-file: "sbom-${{ matrix.service }}.spdx.json"
          upload-artifact: true
          upload-artifact-retention: 5

  # ---------------------------------------------------------------------------
  # Job 2: Security Scan (Trivy)
  # Scans the image that was just pushed. Runs AFTER build-and-push so the
  # image is guaranteed to exist in the registry.
  # fail-fast: false — scan all three services regardless of individual results.
  # exit-code: "1" enforces a hard gate: fixable CRITICAL/HIGH CVEs block the
  # pipeline. Use a .trivyignore file to document accepted exceptions.
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-push
    permissions:
      contents: read
      packages: read
      security-events: write   # required to upload SARIF to the Security tab
    strategy:
      fail-fast: false
      matrix:
        service: [api, start, worker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag for this commit
        id: image-ref
        # Reconstruct the SHA-based tag that build-and-push used.
        # Must match the type=sha,prefix=main- pattern in metadata-action.
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=ghcr.io/${OWNER}/openpanel-${{ matrix.service }}:main-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.image-ref.outputs.tag }}
          format: "sarif"
          output: "trivy-results-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"         # hard gate: fails pipeline on fixable CVEs
          ignore-unfixed: true   # skip CVEs with no upstream fix yet

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()   # upload even when Trivy found issues so they appear in Security tab
        with:
          sarif_file: "trivy-results-${{ matrix.service }}.sarif"
