checks:
  addAllBuiltIn: false
  include:
    - "latest-tag"
    - "unset-cpu-requirements"
    - "unset-memory-requirements"
    - "privilege-escalation-container"
    - "writable-host-mount"
  # Explicitly exclude checks that do not apply to this project:
  # - no-anti-affinity: single-node Minikube cluster — anti-affinity is meaningless
  # - no-read-only-root-fs: databases (postgres, clickhouse) and init containers need writable FS
  # - run-as-non-root: fix-permissions init container must run as root to chown volumes
  # - non-isolated-pod: network policies are managed separately, not in app manifests
  exclude:
    - "no-anti-affinity"
    - "no-read-only-root-fs"
    - "run-as-non-root"
    - "non-isolated-pod"
