# =============================================================================
# App of Apps — Bootstrap Application
#
# This is the root ArgoCD Application. It watches k8s/argocd/applications/
# and manages all other ArgoCD Applications as GitOps objects.
#
# How to bootstrap:
#   kubectl apply -f k8s/argocd/bootstrap-app.yaml
#
# After this single command, ArgoCD manages everything else automatically:
# - Applies all Application definitions found in k8s/argocd/applications/
# - Detects changes to any Application YAML (e.g. targetRevision updates)
#   and re-applies them without any manual kubectl apply
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/RubenLopSol/proyecto-final-devops.git
    targetRevision: master
    path: k8s/argocd/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
