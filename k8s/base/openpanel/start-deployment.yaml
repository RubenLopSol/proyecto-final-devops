apiVersion: apps/v1
kind: Deployment
metadata:
  name: openpanel-start
  namespace: openpanel
  labels:
    app: openpanel-start
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openpanel-start
  template:
    metadata:
      labels:
        app: openpanel-start
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: start
          image: ghcr.io/rubenlopsol/openpanel-start:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: openpanel-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
