apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openpanel

resources:
  # Config
  - configmap.yaml
  # API (Blue-Green)
  - api-deployment-blue.yaml
  - api-deployment-green.yaml
  - api-service.yaml
  # Dashboard
  - start-deployment.yaml
  - start-service.yaml
  # DB migrations (runs as ArgoCD PreSync hook before every deploy)
  - migrate-job.yaml
  # Worker
  - worker-deployment.yaml
  # PostgreSQL
  - postgres-statefulset.yaml
  - postgres-service.yaml
  # ClickHouse
  - clickhouse-configmap.yaml
  - clickhouse-statefulset.yaml
  - clickhouse-service.yaml
  # Redis
  - redis-deployment.yaml
  - redis-service.yaml
  # Networking
  - ingress.yaml
  - network-policies.yaml

commonLabels:
  project: openpanel
