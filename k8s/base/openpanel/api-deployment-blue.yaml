apiVersion: apps/v1
kind: Deployment
metadata:
  name: openpanel-api-blue
  namespace: openpanel
  labels:
    app: openpanel-api
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openpanel-api
      version: blue
  template:
    metadata:
      labels:
        app: openpanel-api
        version: blue
      annotations:
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: api
          image: ghcr.io/RubenLopSol/openpanel-api:main-244ddd3
          command: ["node", "dist/index.js"]
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: openpanel-config
          env:
            - name: HOME
              value: /tmp
            - name: COREPACK_HOME
              value: /tmp/corepack
            - name: XDG_CACHE_HOME
              value: /tmp/.cache
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: openpanel-secrets
                  key: DATABASE_URL
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: openpanel-secrets
                  key: CLICKHOUSE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: openpanel-secrets
                  key: REDIS_URL
            - name: API_SECRET
              valueFrom:
                secretKeyRef:
                  name: openpanel-secrets
                  key: API_SECRET
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
