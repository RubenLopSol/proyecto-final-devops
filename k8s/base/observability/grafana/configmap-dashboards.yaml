apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "openpanel"
        orgId: 1
        folder: "OpenPanel"
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/provisioning/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-openpanel
  namespace: observability
data:
  openpanel.json: |
    {
      "title": "OpenPanel - Kubernetes Monitoring",
      "uid": "openpanel-k8s",
      "version": 3,
      "schemaVersion": 36,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Memory Usage by Pod (openpanel)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "container_memory_usage_bytes{namespace=\"openpanel\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "CPU Usage by Pod (openpanel)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"openpanel\"}[5m])",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Memory Usage - Current (bytes)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "color": { "mode": "thresholds" },
              "thresholds": { "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 1073741824 },
                { "color": "red", "value": 2147483648 }
              ]}
            }
          },
          "targets": [
            {
              "expr": "sum(container_memory_usage_bytes{namespace=\"openpanel\"})",
              "legendFormat": "Total Memory",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Pods Running",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "thresholds" },
              "thresholds": { "steps": [
                { "color": "red", "value": null },
                { "color": "green", "value": 1 }
              ]}
            }
          },
          "targets": [
            {
              "expr": "count(container_memory_usage_bytes{namespace=\"openpanel\", pod!=\"\"})",
              "legendFormat": "Pods",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "CPU Total (cores)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short", "decimals": 3, "color": { "mode": "thresholds" },
              "thresholds": { "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 1 },
                { "color": "red", "value": 2 }
              ]}
            }
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"openpanel\"}[5m]))",
              "legendFormat": "Total CPU",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Prometheus Targets UP",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "thresholds" },
              "thresholds": { "steps": [
                { "color": "red", "value": null },
                { "color": "green", "value": 1 }
              ]}
            }
          },
          "targets": [
            {
              "expr": "count(up == 1)",
              "legendFormat": "Targets UP",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Memory Usage by Pod - History",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "color": { "mode": "palette-classic" } }
          },
          "targets": [
            {
              "expr": "container_memory_usage_bytes{namespace=\"openpanel\", pod!=\"\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "CPU Usage by Pod - History",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "palette-classic" } }
          },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"openpanel\", pod!=\"\"}[5m])",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "Redis UP",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "thresholds" },
              "thresholds": { "steps": [
                { "color": "red", "value": null },
                { "color": "green", "value": 1 }
              ]}
            },
            "overrides": [{ "matcher": { "id": "byName", "options": "Value" }, "properties": [{ "id": "mappings", "value": [{ "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }] }] }]
          },
          "targets": [{ "expr": "redis_up", "legendFormat": "Redis", "refId": "A" }]
        },
        {
          "id": 10,
          "title": "Redis Connected Clients",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 10 }] }
            }
          },
          "targets": [{ "expr": "redis_connected_clients", "legendFormat": "Clients", "refId": "A" }]
        },
        {
          "id": 11,
          "title": "Redis Memory Used",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 536870912 }, { "color": "red", "value": 858993459 }] }
            }
          },
          "targets": [{ "expr": "redis_memory_used_bytes", "legendFormat": "Memory", "refId": "A" }]
        },
        {
          "id": 12,
          "title": "PostgreSQL UP",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            },
            "overrides": [{ "matcher": { "id": "byName", "options": "Value" }, "properties": [{ "id": "mappings", "value": [{ "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }] }] }]
          },
          "targets": [{ "expr": "pg_up", "legendFormat": "PostgreSQL", "refId": "A" }]
        },
        {
          "id": 13,
          "title": "PostgreSQL DB Size",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1073741824 }] }
            }
          },
          "targets": [{ "expr": "pg_database_size_bytes{datname=\"openpanel\"}", "legendFormat": "openpanel DB", "refId": "A" }]
        },
        {
          "id": 14,
          "title": "Node Disk Available",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 5368709120 }, { "color": "green", "value": 10737418240 }] }
            }
          },
          "targets": [{ "expr": "node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"}", "legendFormat": "Available", "refId": "A" }]
        },
        {
          "id": 15,
          "title": "Redis Commands/sec",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "ops", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "rate(redis_commands_processed_total[5m])", "legendFormat": "Commands/s", "refId": "A" }]
        },
        {
          "id": 16,
          "title": "Redis Memory Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "bytes", "color": { "mode": "palette-classic" } } },
          "targets": [
            { "expr": "redis_memory_used_bytes", "legendFormat": "Used", "refId": "A" },
            { "expr": "redis_memory_max_bytes", "legendFormat": "Max", "refId": "B" }
          ]
        },
        {
          "id": 17,
          "title": "PostgreSQL Rows Fetched/sec",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "ops", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "rate(pg_stat_database_tup_fetched{datname=\"openpanel\"}[5m])", "legendFormat": "Rows Fetched/s", "refId": "A" }]
        },
        {
          "id": 18,
          "title": "Node Disk Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "color": { "mode": "palette-classic" } } },
          "targets": [{
            "expr": "1 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"})",
            "legendFormat": "Disk Used %",
            "refId": "A"
          }]
        }
      ]
    }
