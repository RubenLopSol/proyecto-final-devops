apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "openpanel"
        orgId: 1
        folder: "OpenPanel"
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/provisioning/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-openpanel
  namespace: observability
data:
  openpanel.json: |
    {
      "title": "OpenPanel - Kubernetes Monitoring",
      "uid": "openpanel-k8s",
      "version": 1,
      "schemaVersion": 36,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Memory Usage by Pod (openpanel)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "container_memory_usage_bytes{namespace=\"openpanel\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "CPU Usage by Pod (openpanel)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"openpanel\"}[5m])",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Memory Usage - Current (bytes)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "color": { "mode": "thresholds" },
              "thresholds": { "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 1073741824 },
                { "color": "red", "value": 2147483648 }
              ]}
            }
          },
          "targets": [
            {
              "expr": "sum(container_memory_usage_bytes{namespace=\"openpanel\"})",
              "legendFormat": "Total Memory",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Pods Running",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "thresholds" },
              "thresholds": { "steps": [
                { "color": "red", "value": null },
                { "color": "green", "value": 1 }
              ]}
            }
          },
          "targets": [
            {
              "expr": "count(container_memory_usage_bytes{namespace=\"openpanel\"})",
              "legendFormat": "Containers",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Network I/O - openpanel namespace",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "Bps", "color": { "mode": "palette-classic" } }
          },
          "targets": [
            {
              "expr": "rate(container_network_receive_bytes_total{namespace=\"openpanel\"}[5m])",
              "legendFormat": "RX {{pod}}",
              "refId": "A"
            },
            {
              "expr": "rate(container_network_transmit_bytes_total{namespace=\"openpanel\"}[5m])",
              "legendFormat": "TX {{pod}}",
              "refId": "B"
            }
          ]
        },
        {
          "id": 6,
          "title": "Container Restarts (openpanel)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "palette-classic" } }
          },
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"openpanel\"}[5m])",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
