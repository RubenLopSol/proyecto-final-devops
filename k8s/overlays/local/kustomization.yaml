apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/namespaces
  - ../../base/openpanel
  - ../../base/observability
  - ../../base/backup

patches:
  - path: patches/resource-limits.yaml
    target:
      kind: Deployment
      namespace: openpanel

commonAnnotations:
  environment: local
  managed-by: kustomize
