# =============================================================================
# PROD overlay — observability stack aggregator
#
# Renders all four charts (kube-prometheus-stack, loki, promtail, tempo) via
# helmChartInflationGenerator. Each chart has its own subdirectory with
# prod-specific values layered on top of the base values.
#
# Build all:   kustomize build --enable-helm k8s/infrastructure/overlays/prod/observability
# Build one:   kustomize build --enable-helm k8s/infrastructure/overlays/prod/observability/loki
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - kube-prometheus-stack
  - loki
  - promtail
  - tempo
