# =============================================================================
# Loki — PROD overrides
# Merged on top of k8s/infrastructure/base/observability/loki/values.yaml
#
# Prod uses S3 for log storage instead of filesystem.
# SingleBinary mode with filesystem cannot scale beyond 1 replica — Loki's
# chart validation rejects replicas > 1 with filesystem storage.
# S3 backend enables HA with multiple replicas.
#
# Authentication via IRSA — no access keys needed, pod identity provides creds.
# =============================================================================

loki:
  storage:
    type: s3
    bucketNames:
      chunks: openpanel-loki-logs-prod
      ruler: openpanel-loki-logs-prod
      admin: openpanel-loki-logs-prod
    s3:
      region: us-east-1
      s3ForcePathStyle: false
      insecure: false

singleBinary:
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
