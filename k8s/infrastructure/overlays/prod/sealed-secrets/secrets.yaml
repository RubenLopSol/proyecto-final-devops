# =============================================================================
# Sealed Secrets — PROD cluster credentials
#
# IMPORTANT: These secrets must be re-sealed against the prod cluster key.
# The blobs below are NOT valid for prod — they are placeholders.
#
# To generate for prod:
#   1. Connect kubectl to the prod cluster
#   2. Run: make reseal-secrets ENV=prod \
#             POSTGRES_PASSWORD=<prod-password> \
#             REDIS_PASSWORD=<prod-password> \
#             CLICKHOUSE_PASSWORD=<prod-password> \
#             API_SECRET=<prod-secret> \
#             GRAFANA_PASSWORD=<prod-password> \
#             MINIO_PASSWORD=<prod-password>
#   3. Commit the updated file
#
# Sections:
#   1. postgres-credentials    — PostgreSQL username + password       (namespace: openpanel)
#   2. redis-credentials       — Redis password                       (namespace: openpanel)
#   3. clickhouse-credentials  — ClickHouse username + password       (namespace: openpanel)
#   4. openpanel-secrets       — App connection URLs + API secret     (namespace: openpanel)
#   5. grafana-admin-credentials — Grafana admin username + password  (namespace: observability)
#   6. minio-credentials       — MinIO root user + password           (namespace: backup)
# =============================================================================
