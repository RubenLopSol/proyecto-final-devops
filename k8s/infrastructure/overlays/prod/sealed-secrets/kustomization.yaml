# =============================================================================
# Sealed Secrets — PROD overlay
#
# Renders the controller Helm chart and applies the prod SealedSecret
# resources in one pass.
#
# Kustomize cannot merge helmCharts blocks from base, so the full chart spec
# is re-declared here pointing valuesFile at the base values.
#
# Standalone deploy:
#   kustomize build --enable-helm k8s/infrastructure/overlays/prod/sealed-secrets | kubectl apply -f -
#
# Regenerate secrets.yaml:
#   make reseal-secrets ENV=prod
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: sealed-secrets
    repo: https://bitnami-labs.github.io/sealed-secrets
    version: "2.16.1"
    releaseName: sealed-secrets
    namespace: sealed-secrets
    valuesFile: ../../../base/sealed-secrets/values.yaml
    includeCRDs: true

resources:
  - secrets.yaml

# Label every resource created by this overlay (controller + SealedSecrets).
# includeSelectors: false adds labels to metadata only — does not touch
# Deployment/Service selectors, which avoids breaking Helm's own selectors.
labels:
  - pairs:
      app.kubernetes.io/name: sealed-secrets
      environment: prod
    includeSelectors: false
