# Prod path patches — switches every Application CR from staging to prod overlay.
# Applied by overlays/prod/argocd/kustomization.yaml as a strategic merge patch.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  source:
    path: k8s/infrastructure/overlays/prod/sealed-secrets
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
spec:
  source:
    path: k8s/infrastructure/overlays/prod/observability
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
spec:
  source:
    path: k8s/infrastructure/overlays/prod/minio
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero-operator
  namespace: argocd
spec:
  source:
    path: k8s/infrastructure/overlays/prod/velero-operator
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  source:
    path: k8s/infrastructure/overlays/prod/velero
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openpanel
  namespace: argocd
spec:
  source:
    path: k8s/apps/overlays/prod
