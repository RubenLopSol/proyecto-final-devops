# =============================================================================
# kube-prometheus-stack — STAGING overlay
#
# Layers staging-specific values on top of the base values.
# Kustomize cannot merge helmCharts blocks, so the full chart spec is
# re-declared here with valuesFile pointing at the base and
# additionalValuesFiles adding the staging overrides.
#
# Standalone build:
#   kustomize build --enable-helm k8s/infrastructure/overlays/staging/observability/kube-prometheus-stack
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: "65.1.1"
    releaseName: kube-prometheus-stack
    namespace: observability
    includeCRDs: true
    valuesFile: ../../../../base/observability/kube-prometheus-stack/values.yaml
    additionalValuesFiles:
      - values.yaml
