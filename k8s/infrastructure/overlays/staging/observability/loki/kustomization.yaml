# =============================================================================
# Loki — STAGING overlay
#
# Layers staging-specific values on top of the base values.
#
# Standalone build:
#   kustomize build --enable-helm k8s/infrastructure/overlays/staging/observability/loki
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: "6.6.2"
    releaseName: loki
    namespace: observability
    valuesFile: ../../../../base/observability/loki/values.yaml
    additionalValuesFiles:
      - values.yaml
