# =============================================================================
# Velero — STAGING overrides
# Backend: LocalStack (in-cluster S3 emulator, provisioned by Terraform)
#
# LocalStack accepts any credentials in default mode — the values below are
# intentionally static placeholders (not real secrets).
# =============================================================================

# Inline credentials for LocalStack (any value works — LocalStack is not
# authenticated by default). These are NOT real credentials.
credentials:
  secretContents:
    cloud: |
      [default]
      aws_access_key_id=test
      aws_secret_access_key=test

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: openpanel-velero-staging
      default: true
      config:
        region: us-east-1
        s3ForcePathStyle: "true"
        s3Url: http://localstack.backup.svc.cluster.local:4566

# Smaller resources for Minikube
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

nodeAgent:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
