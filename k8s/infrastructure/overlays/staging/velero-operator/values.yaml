# =============================================================================
# Velero — STAGING overrides
# Backend: LocalStack (in-cluster S3 emulator, provisioned by Terraform)
#
# LocalStack accepts any credentials in default mode — the values below are
# intentionally static placeholders (not real secrets).
# =============================================================================

# Inline credentials for LocalStack (any value works — LocalStack is not
# authenticated by default). These are NOT real credentials.
credentials:
  secretContents:
    cloud: |
      [default]
      aws_access_key_id=test
      aws_secret_access_key=test

# BackupStorageLocation is managed declaratively by the 'velero' ArgoCD app
# (k8s/infrastructure/overlays/staging/velero). Do not configure it here to
# avoid SharedResourceWarning from two apps owning the same resource.

# Smaller resources for Minikube
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

nodeAgent:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
