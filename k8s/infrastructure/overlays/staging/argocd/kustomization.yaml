# =============================================================================
# STAGING overlay — ArgoCD
#
# Renders ArgoCD Helm chart with staging values (argocd.local, small resources)
# and includes all Application CRs and the AppProject tagged environment=staging.
# patches/app-env.yaml sets all env-specific Application CR paths to staging.
#
# Install: ./scripts/install-argocd.sh staging
# Build:   kustomize build --enable-helm k8s/infrastructure/overlays/staging/argocd
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/argocd/applications
  - ../../../base/argocd/projects

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: "7.7.0"
    releaseName: argocd
    namespace: argocd
    valuesFile: ../../../base/argocd/install/values.yaml
    additionalValuesFiles:
      - values.yaml
    includeCRDs: true

# Add environment label to all resources (Application CRs + ArgoCD components).
# includeSelectors: false — labels are added to metadata only, not to
# spec.selector, avoiding conflicts with Helm's own selector labels.
labels:
  - pairs:
      environment: staging
      project: openpanel
    includeSelectors: false

patches:
  - path: patches/app-env.yaml
