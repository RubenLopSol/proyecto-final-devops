# Staging path patches — sets the correct overlay path and branch for each Application CR.
# Applied by overlays/staging/argocd/kustomization.yaml.
# targetRevision is set here so it can be updated per-branch without touching base files.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  source:
    targetRevision: test/ci-pipeline-validation
    path: k8s/infrastructure/overlays/staging/sealed-secrets
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
spec:
  source:
    targetRevision: test/ci-pipeline-validation
    path: k8s/infrastructure/overlays/staging/observability
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
spec:
  source:
    targetRevision: test/ci-pipeline-validation
    path: k8s/infrastructure/overlays/staging/minio
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  source:
    targetRevision: test/ci-pipeline-validation
    path: k8s/infrastructure/overlays/staging/velero
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openpanel
  namespace: argocd
spec:
  source:
    targetRevision: test/ci-pipeline-validation
    path: k8s/apps/overlays/staging
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
spec:
  source:
    targetRevision: test/ci-pipeline-validation
