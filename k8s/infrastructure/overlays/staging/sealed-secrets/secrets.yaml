# =============================================================================
# Sealed Secrets — All cluster credentials
#
# All secrets are encrypted with the Sealed Secrets controller RSA key.
#
# To re-seal after a new cluster:  make reseal-secrets
# To apply to cluster:             kubectl apply -f k8s/infrastructure/base/sealed-secrets/secrets.yaml
#
# Sections:
#   1. postgres-credentials    — PostgreSQL username + password       (namespace: openpanel)
#   2. redis-credentials       — Redis password                       (namespace: openpanel)
#   3. clickhouse-credentials  — ClickHouse username + password       (namespace: openpanel)
#   4. openpanel-secrets       — App connection URLs + API secret     (namespace: openpanel)
#   5. grafana-admin-credentials — Grafana admin username + password  (namespace: observability)
#   6. minio-credentials       — MinIO root user + password           (namespace: backup)
# =============================================================================

# -----------------------------------------------------------------------------
# 1. PostgreSQL credentials
#    Used by: postgres StatefulSet (env vars), openpanel-secrets (DATABASE_URL)
# -----------------------------------------------------------------------------
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: postgres-credentials
  namespace: openpanel
spec:
  encryptedData:
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      creationTimestamp: null
      name: postgres-credentials
      namespace: openpanel

# -----------------------------------------------------------------------------
# 2. Redis credentials
#    Used by: redis Deployment (requirepass), openpanel-secrets (REDIS_URL)
# -----------------------------------------------------------------------------
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: redis-credentials
  namespace: openpanel
spec:
  encryptedData:
    REDIS_PASSWORD: 
  template:
    metadata:
      creationTimestamp: null
      name: redis-credentials
      namespace: openpanel

# -----------------------------------------------------------------------------
# 3. ClickHouse credentials
#    Used by: clickhouse StatefulSet (env vars), openpanel-secrets (CLICKHOUSE_URL)
# -----------------------------------------------------------------------------
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: clickhouse-credentials
  namespace: openpanel
spec:
  encryptedData:
    CLICKHOUSE_PASSWORD: 
    CLICKHOUSE_USER: 
  template:
    metadata:
      creationTimestamp: null
      name: clickhouse-credentials
      namespace: openpanel

# -----------------------------------------------------------------------------
# 4. OpenPanel application secrets
#    Used by: api and worker Deployments (envFrom)
#    Contains: DATABASE_URL, DATABASE_URL_DIRECT, CLICKHOUSE_URL, REDIS_URL,
#              API_SECRET
# -----------------------------------------------------------------------------
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: openpanel-secrets
  namespace: openpanel
spec:
  encryptedData:
    API_SECRET: 
    CLICKHOUSE_URL: 
    DATABASE_URL: 
    DATABASE_URL_DIRECT: 
    REDIS_URL: 
  template:
    metadata:
      creationTimestamp: null
      name: openpanel-secrets
      namespace: openpanel

# -----------------------------------------------------------------------------
# 5. Grafana admin credentials
#    Used by: kube-prometheus-stack Helm chart (grafana.admin.existingSecret)
# -----------------------------------------------------------------------------
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: grafana-admin-credentials
  namespace: observability
spec:
  encryptedData:
    admin-password: 
    admin-user: 
  template:
    metadata:
      creationTimestamp: null
      name: grafana-admin-credentials
      namespace: observability

# -----------------------------------------------------------------------------
# 6. MinIO credentials
#    Used by: minio Deployment (MINIO_ROOT_USER / MINIO_ROOT_PASSWORD env vars)
#             and Velero backup location config
# -----------------------------------------------------------------------------
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: minio-credentials
  namespace: backup
spec:
  encryptedData:
    MINIO_ROOT_PASSWORD: 
    MINIO_ROOT_USER: 
  template:
    metadata:
      creationTimestamp: null
      name: minio-credentials
      namespace: backup
