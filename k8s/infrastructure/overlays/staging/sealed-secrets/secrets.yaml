# =============================================================================
# Sealed Secrets — All cluster credentials
#
# Sections:
#   1. postgres-credentials        (namespace: openpanel)
#   2. redis-credentials           (namespace: openpanel)
#   3. clickhouse-credentials      (namespace: openpanel)
#   4. openpanel-secrets           (namespace: openpanel)
#   5. grafana-admin-credentials   (namespace: observability)
#   6. minio-credentials           (namespace: backup)
# =============================================================================

# -----------------------------------------------------------------------------
# 1. PostgreSQL credentials
#    Used by: postgres StatefulSet, openpanel-secrets (DATABASE_URL)
# -----------------------------------------------------------------------------
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: postgres-credentials
  namespace: openpanel
spec:
  encryptedData:
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      creationTimestamp: null
      name: postgres-credentials
      namespace: openpanel

# -----------------------------------------------------------------------------
# 2. Redis credentials
#    Used by: redis Deployment, openpanel-secrets (REDIS_URL)
# -----------------------------------------------------------------------------
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: redis-credentials
  namespace: openpanel
spec:
  encryptedData:
    REDIS_PASSWORD: 
  template:
    metadata:
      creationTimestamp: null
      name: redis-credentials
      namespace: openpanel

# -----------------------------------------------------------------------------
# 3. ClickHouse credentials
#    Used by: clickhouse StatefulSet, openpanel-secrets (CLICKHOUSE_URL)
# -----------------------------------------------------------------------------
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: clickhouse-credentials
  namespace: openpanel
spec:
  encryptedData:
    CLICKHOUSE_PASSWORD: 
    CLICKHOUSE_USER: 
  template:
    metadata:
      creationTimestamp: null
      name: clickhouse-credentials
      namespace: openpanel

# -----------------------------------------------------------------------------
# 4. OpenPanel application secrets
#    Used by: api and worker Deployments (envFrom)
# -----------------------------------------------------------------------------
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: openpanel-secrets
  namespace: openpanel
spec:
  encryptedData:
    API_SECRET: 
    CLICKHOUSE_URL: 
    DATABASE_URL: 
    DATABASE_URL_DIRECT: 
    REDIS_URL: 
  template:
    metadata:
      creationTimestamp: null
      name: openpanel-secrets
      namespace: openpanel

# -----------------------------------------------------------------------------
# 5. Grafana admin credentials
#    Used by: kube-prometheus-stack (grafana.admin.existingSecret)
# -----------------------------------------------------------------------------
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: grafana-admin-credentials
  namespace: observability
spec:
  encryptedData:
    admin-password: 
    admin-user: 
  template:
    metadata:
      creationTimestamp: null
      name: grafana-admin-credentials
      namespace: observability

# -----------------------------------------------------------------------------
# 6. MinIO credentials
#    Used by: minio Deployment (MINIO_ROOT_USER / MINIO_ROOT_PASSWORD)
# -----------------------------------------------------------------------------
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: minio-credentials
  namespace: backup
spec:
  encryptedData:
    MINIO_ROOT_PASSWORD: 
    MINIO_ROOT_USER: 
  template:
    metadata:
      creationTimestamp: null
      name: minio-credentials
      namespace: backup
