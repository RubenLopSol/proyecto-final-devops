# =============================================================================
# Base — MinIO deployment
#
# MinIO runs as an S3-compatible object store inside the cluster (namespace:
# backup). It is used by Velero as the backup storage backend in staging.
# Credentials are injected from the minio-credentials SealedSecret.
# PVC size is overridden per environment: 5Gi staging, 50Gi prod.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: backup

resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml

labels:
  - pairs:
      project: openpanel-backup
    includeSelectors: false
