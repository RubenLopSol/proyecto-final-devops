# =============================================================================
# local-path-provisioner — Rancher Local Path Provisioner
#
# Provides the "local-path" StorageClass that creates PV directories on the
# exact node where the pod is scheduled (WaitForFirstConsumer binding mode).
#
# This is required in minikube multi-node setups where pods have nodeSelectors:
# the default "standard" StorageClass (minikube-hostpath) creates PV dirs on
# the primary node regardless of where the pod will be scheduled, causing
# "no such file or directory" mount errors on worker nodes.
#
# local-path-provisioner solves this by deferring directory creation until the
# pod is bound to a specific node, then creating the dir on THAT node.
#
# Version v0.0.28 — pinned. To upgrade: download the new YAML and verify.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - local-path-storage.yaml

patches:
  - path: resources-patch.yaml
