# =============================================================================
# Tempo — base chart definition
#
# Chart:   grafana/tempo
# Version: 1.10.3
# Mode:    Single binary — local filesystem storage
#
# No environment overrides needed — same values in staging and prod.
#
# Standalone deploy:
#   kustomize build --enable-helm k8s/infrastructure/base/observability/tempo | kubectl apply -f -
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: tempo
    repo: https://grafana.github.io/helm-charts
    version: "1.10.3"
    releaseName: tempo
    namespace: observability
    valuesFile: values.yaml
