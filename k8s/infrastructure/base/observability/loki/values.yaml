# =============================================================================
# Loki — Helm values
# Chart: grafana/loki
# =============================================================================

# Modo simple para entorno local (single binary)
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  # schema_config is required by Loki chart >= 6.0.
  # Without it the Helm template fails to render.
  # v13 + tsdb is the current recommended schema for new installations.
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  # structuredConfig is merged on top of the chart-generated loki config.
  # With replication_factor=1 and a single pod, memberlist causes a ring
  # deadlock on pod restart (same IP reused, stale entry persists).
  # All rings are switched to inmemory; join_members cleared so loki does
  # not attempt gossip with no peers available.
  structuredConfig:
    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
    distributor:
      ring:
        kvstore:
          store: inmemory
    ruler:
      ring:
        kvstore:
          store: inmemory
    memberlist:
      join_members: []

singleBinary:
  replicas: 1
  nodeSelector:
    workload: observability
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Desactivar componentes de modo distribuido (no necesarios en local)
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
