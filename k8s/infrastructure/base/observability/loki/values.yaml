# =============================================================================
# Loki — Helm values
# Chart: grafana/loki
# =============================================================================

# Modo simple para entorno local (single binary)
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  # schema_config is required by Loki chart >= 6.0.
  # Without it the Helm template fails to render and ArgoCD shows Unknown sync status.
  # v13 + tsdb is the current recommended schema for new installations.
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  # structuredConfig is merged on top of the chart-generated loki config.
  # This is the correct way to override ring and memberlist settings —
  # setting them directly under loki.ingester/distributor/ruler does NOT
  # work because the chart generates those sections from its own templates.
  #
  # With replication_factor=1 and a single StatefulSet pod, memberlist gossip
  # causes a ring deadlock on pod restart: the pod gets the same IP, the
  # old unhealthy ring entry persists, and the readiness probe never passes.
  # Switching all rings to kvstore: inmemory eliminates gossip entirely.
  structuredConfig:
    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
    distributor:
      ring:
        kvstore:
          store: inmemory
    ruler:
      ring:
        kvstore:
          store: inmemory
    # join_members overrides the chart-hardcoded loki-memberlist headless
    # service entry. With all rings inmemory, memberlist has no peers to
    # join and will succeed immediately without gossip.
    memberlist:
      join_members: []

singleBinary:
  replicas: 1
  nodeSelector:
    workload: observability
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Desactivar componentes de modo distribuido (no necesarios en local)
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
