# =============================================================================
# Loki — Helm values
# Chart: grafana/loki
# =============================================================================

# Modo simple para entorno local (single binary)
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  # schema_config is required by Loki chart >= 6.0.
  # Without it the Helm template fails to render and ArgoCD shows Unknown sync status.
  # v13 + tsdb is the current recommended schema for new installations.
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

singleBinary:
  replicas: 1
  nodeSelector:
    workload: observability
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Desactivar componentes de modo distribuido (no necesarios en local)
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
