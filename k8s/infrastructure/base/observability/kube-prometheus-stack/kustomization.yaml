# =============================================================================
# kube-prometheus-stack — base chart definition
#
# Chart:   prometheus-community/kube-prometheus-stack
# Version: 65.1.1
# Includes: Prometheus + Grafana + AlertManager + Node Exporter + kube-state-metrics
#
# Standalone deploy (base values only):
#   kustomize build --enable-helm k8s/infrastructure/base/observability/kube-prometheus-stack | kubectl apply -f -
#
# In practice, deploy via the environment overlay which merges base values
# with environment-specific overrides:
#   kustomize build --enable-helm k8s/infrastructure/overlays/staging/observability
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: "65.1.1"
    releaseName: kube-prometheus-stack
    namespace: observability
    includeCRDs: true
    valuesFile: values.yaml
