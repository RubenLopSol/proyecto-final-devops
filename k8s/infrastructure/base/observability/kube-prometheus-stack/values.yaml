# =============================================================================
# kube-prometheus-stack — Helm values
# Incluye: Prometheus + Grafana + AlertManager + Node Exporter + kube-state-metrics
# Chart: prometheus-community/kube-prometheus-stack
# =============================================================================

# ----------------------------------------------------------------------------
# Prometheus
# ----------------------------------------------------------------------------
prometheus:
  prometheusSpec:
    retention: 15d
    # Pin Prometheus to the observability node group.
    # Node is labelled workload=observability by scripts/setup-minikube.sh.
    nodeSelector:
      workload: observability
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

    # Scrape configs personalizados para OpenPanel
    additionalScrapeConfigs:
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

# Reglas de alerta personalizadas
additionalPrometheusRulesMap:
  openpanel-alerts:
    groups:
      - name: openpanel-alerts
        rules:
          - alert: ServiceDown
            expr: up{job=~".*openpanel.*"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
              description: "{{ $labels.job }} has been unreachable for more than 2 minutes."

          - alert: HighErrorRate
            expr: >
              sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
              /
              sum(rate(http_requests_total[5m])) by (job)
              > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.job }}"
              description: "Error rate above 5% for more than 5 minutes."

          - alert: HighMemoryUsage
            expr: >
              container_memory_usage_bytes{namespace="openpanel"}
              /
              container_spec_memory_limit_bytes{namespace="openpanel"}
              > 0.9
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ $labels.pod }}"
              description: "Memory usage above 90% of the configured limit."

          - alert: DatabaseDown
            expr: pg_up == 0 or redis_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Database {{ $labels.job }} is down"
              description: "Database unreachable for more than 1 minute."

# ----------------------------------------------------------------------------
# Grafana
# ----------------------------------------------------------------------------
grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  nodeSelector:
    workload: observability

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.local

  # Datasources: Prometheus + Loki + Tempo con correlación
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki-gateway.observability.svc.cluster.local
      editable: false
      jsonData:
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: "traceID=(\\w+)"
            name: TraceID
            url: "$${__value.raw}"

    - name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      url: http://tempo.observability.svc.cluster.local:3100
      editable: false
      jsonData:
        tracesToLogs:
          datasourceUid: loki
          tags: ["job", "namespace", "pod"]
        serviceMap:
          datasourceUid: prometheus

# ----------------------------------------------------------------------------
# AlertManager
# ----------------------------------------------------------------------------
alertmanager:
  enabled: true
  alertmanagerSpec:
    nodeSelector:
      workload: observability
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'null'
      routes:
        - matchers:
            - severity = critical
          receiver: 'null'
          continue: false
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ['alertname', 'namespace']
    receivers:
      # 'null' receiver: alerts are evaluated and routed but not forwarded.
      # Replace with a real integration for production:
      #   slack_configs, email_configs, pagerduty_configs, webhook_configs
      - name: 'null'

# ----------------------------------------------------------------------------
# Node Exporter (métricas del nodo)
# ----------------------------------------------------------------------------
nodeExporter:
  enabled: true

# ----------------------------------------------------------------------------
# kube-state-metrics (métricas de objetos Kubernetes)
# ----------------------------------------------------------------------------
kubeStateMetrics:
  enabled: true
