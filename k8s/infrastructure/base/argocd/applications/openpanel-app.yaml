# Wave 3 — OpenPanel application, after infrastructure is healthy
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openpanel
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openpanel
  source:
    repoURL: https://github.com/RubenLopSol/proyecto-final-devops.git
    targetRevision: master
    # Set by overlays/*/argocd/patches/app-env.yaml — never hardcoded here
    path: PLACEHOLDER
  destination:
    server: https://kubernetes.default.svc
    namespace: openpanel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
