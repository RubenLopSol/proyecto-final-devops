# =============================================================================
# Loki — Helm values
# Chart: grafana/loki
# =============================================================================

# Modo simple para entorno local (single binary)
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Desactivar componentes de modo distribuido (no necesarios en local)
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
