# =============================================================================
# Promtail — Helm values
# Chart: grafana/promtail
# Recoge logs de todos los pods y los envía a Loki
# =============================================================================

config:
  clients:
    - url: http://loki-gateway.observability.svc.cluster.local/loki/api/v1/push

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
