# Strategic merge patch — start (Next.js dashboard) for dev
# Reduces resource requests for Minikube.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openpanel-start
  namespace: openpanel
spec:
  template:
    spec:
      containers:
        - name: start
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 512Mi
