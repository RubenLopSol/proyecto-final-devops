# ---------------------------------------------------------------------------
# STAGING overlay — Minikube / local development
#
# Inherits everything from base and applies three patches:
#   - api-blue.yaml   : scale blue API to 1 replica, reduce resource requests
#   - start.yaml      : reduce dashboard resource requests
#   - worker.yaml     : reduce worker resource requests
#
# StatefulSets (postgres, clickhouse) are not patched — their base limits
# are already Minikube-viable (postgres 2Gi, clickhouse 8Gi).
# ---------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/openpanel

commonAnnotations:
  environment: staging
  managed-by: kustomize

labels:
  - pairs:
      env: staging
    includeSelectors: false

patches:
  - path: patches/api-blue.yaml
  - path: patches/start.yaml
  - path: patches/worker.yaml
