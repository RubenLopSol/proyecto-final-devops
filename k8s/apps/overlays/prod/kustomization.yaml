# ---------------------------------------------------------------------------
# PROD overlay — production cluster
#
# Inherits everything from base and applies:
#   patches/api-blue.yaml    : 3 replicas (base has 2)
#   patches/worker.yaml      : 2 replicas (base has 1)
#   patches/ingress.yaml     : TLS + real domain names (requires cert-manager)
#   patches/configmap.yaml   : prod URLs replacing cluster-internal defaults
#   resources/pdb.yaml       : PodDisruptionBudget — keeps ≥1 API pod up during drains
#
# Before deploying to prod:
#   1. Install cert-manager and create a ClusterIssuer named letsencrypt-prod
#   2. Update domain names in patches/ingress.yaml and patches/configmap.yaml
#   3. Ensure secrets are resealed with the prod cluster's SealedSecrets key
# ---------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/openpanel
  - resources/pdb.yaml

commonAnnotations:
  environment: prod
  managed-by: kustomize

labels:
  - pairs:
      env: prod
    includeSelectors: false

patches:
  - path: patches/api-blue.yaml
  - path: patches/worker.yaml
  - path: patches/configmap.yaml
  - path: patches/ingress.yaml
