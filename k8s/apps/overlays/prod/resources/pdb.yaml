# PodDisruptionBudget — API (blue deployment)
#
# Guarantees at least 1 API pod remains available during voluntary disruptions
# (node drains, cluster upgrades, rolling restarts).
#
# With 3 replicas in prod, minAvailable: 1 allows Kubernetes to evict up to
# 2 pods at a time — fast enough for upgrades, safe enough for production.
#
# This is a prod-only resource. Dev runs 1 replica so a PDB would block
# all maintenance operations on that single pod.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: openpanel-api-pdb
  namespace: openpanel
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: openpanel-api
      version: blue
