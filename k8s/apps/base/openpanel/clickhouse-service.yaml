apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: openpanel
  labels:
    app: clickhouse
spec:
  type: ClusterIP
  ports:
    - port: 8123
      targetPort: 8123
      protocol: TCP
      name: http
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: native
    - port: 9363
      targetPort: 9363
      protocol: TCP
      name: metrics
  selector:
    app: clickhouse
