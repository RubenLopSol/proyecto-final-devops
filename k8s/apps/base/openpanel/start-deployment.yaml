apiVersion: apps/v1
kind: Deployment
metadata:
  name: openpanel-start
  namespace: openpanel
  labels:
    app: openpanel-start
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openpanel-start
  template:
    metadata:
      labels:
        app: openpanel-start
      annotations:
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      nodeSelector:
        workload: app
      containers:
        - name: start
          image: ghcr.io/rubenlopsol/openpanel-start:main-aef4b94
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: openpanel-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
