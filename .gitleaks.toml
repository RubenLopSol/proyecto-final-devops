# Gitleaks configuration
# https://github.com/gitleaks/gitleaks#configuration

title = "gitleaks config"

[extend]
# Use the default gitleaks ruleset as the base
useDefault = true

# Allowlist paths that contain known false positives.
# These are Helm chart source files (documentation, example values) that were
# accidentally committed before k8s/**/charts/ was added to .gitignore.
# The charts/ directories are kustomize's local Helm cache — equivalent to
# node_modules — and contain example/dummy RSA keys in their README and values
# files, not real secrets.
[allowlist]
description = "Helm chart cache false positives"
paths = [
  '''k8s/.*/charts/.*''',
]
